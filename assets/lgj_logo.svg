<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 180" width="300" height="180">
  <title>Le Grand Jeu</title>
  <desc>The Le Grand Jeu logo: a rhombus composed of 18 equilateral triangles, arranged in 3 rows of 6, with the long diagonal horizontal. The rhombus leans to the right.</desc>

  <g fill="none" stroke="#111111" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round">

    <polygon points="90,0 150,0 120,51.96"/>
    <polygon points="150,0 210,0 180,51.96"/>
    <polygon points="210,0 270,0 240,51.96"/>
    <polygon points="90,0 60,51.96 120,51.96"/>
    <polygon points="150,0 120,51.96 180,51.96"/>
    <polygon points="210,0 180,51.96 240,51.96"/>

    <polygon points="60,51.96 120,51.96 90,103.92"/>
    <polygon points="120,51.96 180,51.96 150,103.92"/>
    <polygon points="180,51.96 240,51.96 210,103.92"/>
    <polygon points="60,51.96 30,103.92 90,103.92"/>
    <polygon points="120,51.96 90,103.92 150,103.92"/>
    <polygon points="180,51.96 150,103.92 210,103.92"/>

    <polygon points="30,103.92 90,103.92 60,155.88"/>
    <polygon points="90,103.92 150,103.92 120,155.88"/>
    <polygon points="150,103.92 210,103.92 180,155.88"/>
    <polygon points="30,103.92 0,155.88 60,155.88"/>
    <polygon points="90,103.92 60,155.88 120,155.88"/>
    <polygon points="150,103.92 120,155.88 180,155.88"/>

  </g>
</svg>
